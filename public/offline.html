<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07110d" />
    <title>GreenroomID sedang offline</title>
    <style>
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07110d;color:#e8f5ef;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px}.card{width:min(420px,100%);border:1px solid rgba(143,220,185,.14);border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));padding:28px;box-shadow:0 28px 80px rgba(0,0,0,.28)}.mark{display:grid;width:48px;height:48px;place-items:center;border-radius:15px;background:linear-gradient(145deg,#2bcf96,#07563f);font-size:20px;font-weight:850}h1{margin:22px 0 8px;font-size:25px;letter-spacing:-.04em}p{margin:0;color:#90a79d;line-height:1.65;font-size:14px}button{margin-top:22px;border:0;border-radius:12px;background:#20b982;color:white;padding:12px 16px;font-weight:750;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark">G</div>
      <h1>Koneksi sedang terputus</h1>
      <p>GreenroomID menyimpan kerangka aplikasi agar tetap ringan. Sambungkan internet untuk memuat data Supabase terbaru.</p>
      <button type="button" onclick="location.reload()">Coba lagi</button>
    </main>
  </body>
</html>
